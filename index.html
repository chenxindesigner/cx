<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Flex 卡片分享器</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://static.line-scdn.net/liff/edge/2.1/sdk.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background-color: #f8f8f8;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.05);
    }
    textarea {
      width: 100%;
      height: 250px;
      margin-bottom: 10px;
      font-size: 14px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #06c755;
      color: white;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .hint {
      margin-top: 10px;
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>請貼上 Flex 或 Message JSON</h2>
    <textarea id="jsonInput" placeholder='{"type":"text","text":"👋 嗨！這是訊息文字"}'></textarea>
    <input id="altTextInput" placeholder="可自訂卡片標題（altText）" />
    <button onclick="sendContent()">📤 分享給 LINE 好友</button>
    <div class="hint">支援 Flex / Text 訊息，請貼上正確 JSON 格式</div>
  </div>

  <script>
    // 初始化 LIFF
    liff.init({ liffId: "2007736327-ZO83VAmo" })
      .then(() => {
        if (!liff.isLoggedIn()) {
          liff.login();
        }
      })
      .catch((err) => {
        alert("❌ LIFF 初始化失敗：" + err);
      });

    function sendContent() {
      const json = document.getElementById("jsonInput").value;
      const altText = document.getElementById("altTextInput").value || "這是一則 Flex 卡片";

      if (!json) {
        alert("⚠️ 請貼上 Flex 或 Message JSON");
        return;
      }

      try {
        const parsed = JSON.parse(json);
        let message = parsed;

        // 若為 Flex，補 altText
        if (parsed.type === "flex") {
          message = {
            type: "flex",
            altText: altText,
            contents: parsed.contents
          };
        }

        if (!liff.isApiAvailable("shareTargetPicker")) {
          alert("⚠️ 目前裝置不支援分享功能，請改用手機");
          return;
        }

        liff.shareTargetPicker([message]).then(() => {
          alert("✅ 分享成功！");
          document.getElementById("jsonInput").value = "";
          document.getElementById("altTextInput").value = "";
        }).catch((err) => {
          alert("❌ 分享失敗：" + err);
        });
      } catch (e) {
        alert("❌ JSON 格式錯誤，請重新檢查\n\n" + e.message);
      }
    }
  </script>
</body>
</html>
